name: Update Events

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC (4 AM CET)
  workflow_dispatch:

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install instructor openai pydantic python-dateutil

      - name: Run scraper
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python events/event_scraper.py

      - name: Run individual scrapers
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
        run: |
          python events/scrapers/scrape_sigu.py
          python events/scrapers/scrape_socialnet.py
          python events/scrapers/scrape_kgst.py
          python events/scrapers/scrape_negz.py
          python events/scrapers/scrape_paritaetische.py
          python events/scrapers/scrape_hiig.py

      - name: Run ICS import
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
        run: python events/ics_import.py

      - name: Run email import
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          SUBMIT_IMAP_HOST: ${{ secrets.SUBMIT_IMAP_HOST }}
          SUBMIT_IMAP_USER: ${{ secrets.SUBMIT_IMAP_USER }}
          SUBMIT_IMAP_PASSWORD: ${{ secrets.SUBMIT_IMAP_PASSWORD }}
        run: python events/email_submit.py

      - name: Run analyzer
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python events/event_analyzer.py --limit 500

      - name: Generate calendar .ics
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
        run: python events/generate_ics.py
