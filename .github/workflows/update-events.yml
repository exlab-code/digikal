name: Update Events

on:
  schedule:
    - cron: '0 3 * * *'  # Daily at 3 AM UTC (4 AM CET)
  workflow_dispatch:

jobs:
  update-events:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install caldav instructor openai pydantic schedule python-dateutil

      - name: Create Directus config
        run: |
          mkdir -p config
          echo '{
            "url": "'"$DIRECTUS_API_URL"'",
            "token": "'"$DIRECTUS_API_TOKEN"'",
            "collection": "scraped_data"
          }' > config/directus.json
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}

      - name: Run scraper
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: python events/event_scraper.py

      - name: Run ICS import
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
        run: python events/ics_import.py

      - name: Run analyzer
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python events/event_analyzer.py --limit 500

      - name: Run calendar sync
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
          NEXTCLOUD_URL: ${{ secrets.NEXTCLOUD_URL }}
          NEXTCLOUD_USERNAME: ${{ secrets.NEXTCLOUD_USERNAME }}
          NEXTCLOUD_PASSWORD: ${{ secrets.NEXTCLOUD_PASSWORD }}
        run: python events/calendar_sync.py --sync-once
