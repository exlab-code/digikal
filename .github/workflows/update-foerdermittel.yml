name: Update Fördermittel JSON

on:
  schedule:
    - cron: '0 7 */2 * *'
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout digikal
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download DB from MCP server
        run: curl -fSL "${{ vars.MCP_SERVER_URL }}/foerdermittel.db" -o foerdermittel.db

      - name: Export JSON
        run: python scripts/export_json.py --db foerdermittel.db -o website/public/foerdermittel.json

      - name: Commit and push if changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/public/foerdermittel.json
          if git diff --cached --quiet; then
            echo "No changes to foerdermittel.json — skipping commit"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update Fördermittel data (automated)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger deploy
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
