name: Update Fördermittel JSON

on:
  # Trigger when foerdermittel-mcp publishes a new release
  repository_dispatch:
    types: [foerdermittel-updated]
  # Fallback: check daily (in case dispatch is missed)
  schedule:
    - cron: '0 7 */2 * *'
  workflow_dispatch: # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout digikal
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download latest DB from foerdermittel-mcp
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo exlab-code/foerdermittel-mcp \
            --pattern "foerdermittel.db" \
            --dir . \
            --clobber

      - name: Export JSON
        run: python scripts/export_json.py --db foerdermittel.db -o website/public/foerdermittel.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/public/foerdermittel.json
          if git diff --cached --quiet; then
            echo "No changes to foerdermittel.json — skipping commit"
          else
            git commit -m "Update Fördermittel data (automated)"
            git push
          fi
