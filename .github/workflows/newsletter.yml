name: Monthly Newsletter

on:
  schedule:
    - cron: '0 7 29 * *'  # 29th of each month at 07:00 UTC (08:00 CET)
  workflow_dispatch:
    inputs:
      month:
        description: 'Month (1-12), leave empty for next month'
        required: false
      year:
        description: 'Year, leave empty for current/next year'
        required: false
      editorial:
        description: 'Custom editorial text (optional)'
        required: false
      no_schedule:
        description: 'Create as draft only (no scheduling)'
        type: boolean
        default: false

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Generate and schedule newsletter
        env:
          DIRECTUS_API_URL: ${{ secrets.DIRECTUS_API_URL }}
          DIRECTUS_API_TOKEN: ${{ secrets.DIRECTUS_API_TOKEN }}
          LISTMONK_URL: ${{ secrets.LISTMONK_URL }}
          LISTMONK_USER: ${{ secrets.LISTMONK_USER }}
          LISTMONK_API: ${{ secrets.LISTMONK_API }}
          INPUT_MONTH: ${{ inputs.month }}
          INPUT_YEAR: ${{ inputs.year }}
          INPUT_EDITORIAL: ${{ inputs.editorial }}
          INPUT_NO_SCHEDULE: ${{ inputs.no_schedule }}
        run: |
          ARGS=""
          if [ -n "$INPUT_MONTH" ]; then
            ARGS="$ARGS --month $INPUT_MONTH"
          fi
          if [ -n "$INPUT_YEAR" ]; then
            ARGS="$ARGS --year $INPUT_YEAR"
          fi
          if [ -n "$INPUT_EDITORIAL" ]; then
            ARGS="$ARGS --editorial \"$INPUT_EDITORIAL\""
          fi
          if [ "$INPUT_NO_SCHEDULE" = "true" ]; then
            ARGS="$ARGS --no-schedule"
          fi
          python newsletter/generate_newsletter.py $ARGS
